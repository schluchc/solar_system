<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solar System WebGL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="hud">
      <div class="title">Solar System (WebGL)</div>
      <div id="status"></div>
      <div class="controls">
        <span>Controls:</span>
        <span>Click to look · Scroll zoom</span>
        <span>W/A/S/D move · T/G up/down · Q/E speed · Space pause · R reset · N names</span>
      </div>
    </div>
    <!-- Desktop focus panel (hidden on touch devices via CSS) -->
    <div id="desktop-focus">
      <button class="desk-toggle" id="desk-btn-planets">Planets ▾</button>
      <div id="desk-planets-panel" hidden></div>
      <button class="desk-toggle" id="desk-btn-craft">Spacecraft ▾</button>
      <div id="desk-craft-panel" hidden></div>
    </div>

    <canvas id="scene"></canvas>

    <!-- Mobile controls (hidden on non-touch via CSS) -->
    <div id="mobile-ui">
      <!-- Bottom bar: joystick left, toolbar right — flex prevents overlap -->
      <div id="mob-bottom">
        <div id="joystick-zone">
          <div id="joystick-base">
            <div id="joystick-knob"></div>
          </div>
        </div>
        <div id="mob-toolbar">
          <button class="mob-btn" id="btn-pause">⏸</button>
          <button class="mob-btn" id="btn-slower" title="Slow time">−</button>
          <button class="mob-btn" id="btn-faster" title="Speed up time">+</button>
          <button class="mob-btn" id="btn-names">N</button>
          <button class="mob-btn" id="btn-planets">⊙</button>
        </div>
      </div>
      <!-- Focus popup (filled by JS, cycles planets → spacecraft → hidden) -->
      <div id="focus-panel" hidden></div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
